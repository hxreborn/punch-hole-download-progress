sonar.projectKey=orbitx
sonar.sources=app/src/main
sonar.tests=app/src/test,app/src/androidTest

sonar.exclusions=app/src/main/kotlin/eu/hxreborn/phdp/ui/component/Scrollbar.kt,tools/**

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7

# S6615 unused-assignment false positive on Compose `var x by remember { mutableStateOf(...) }`
sonar.issue.ignore.multicriteria.e1.ruleKey=kotlin:S6615
sonar.issue.ignore.multicriteria.e1.resourceKey=**/ui/component/preference/**

sonar.issue.ignore.multicriteria.e2.ruleKey=kotlin:S6615
sonar.issue.ignore.multicriteria.e2.resourceKey=**/ui/screen/**

# S107 too-many-params Composables take Modifier + state + callbacks by design
sonar.issue.ignore.multicriteria.e3.ruleKey=kotlin:S107
sonar.issue.ignore.multicriteria.e3.resourceKey=**/ui/**

sonar.issue.ignore.multicriteria.e4.ruleKey=kotlin:S107
sonar.issue.ignore.multicriteria.e4.resourceKey=**/RingRenderer.kt

# S6518 indexed-accessor false positive on java.lang.reflect.Field.get(Object)
sonar.issue.ignore.multicriteria.e5.ruleKey=kotlin:S6518
sonar.issue.ignore.multicriteria.e5.resourceKey=**/xposed/hook/*.kt

# S6518 indexed-accessor false positive on RectF.set(l,t,r,b) overload
sonar.issue.ignore.multicriteria.e6.ruleKey=kotlin:S6518
sonar.issue.ignore.multicriteria.e6.resourceKey=**/BadgePainter.kt

# S1135 TODO comments are tracked separately, treat as info only
sonar.issue.ignore.multicriteria.e7.ruleKey=kotlin:S1135
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.kt
